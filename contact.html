<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Poorvi - Get in touch via email or view my resume.">
    <title>Contact | Poorvi Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">Poorvi.</a>
        <div class="menu-toggle">☰</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="education.html">Education</a>
            <a href="certification.html">Certifications</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <main>
        <section class="contact-section animate-delay-1">
            <h1 class="section-title">Get In <span>Touch</span></h1>
            
            <div class="contact-wrapper">
                <div class="contact-info">
                    <div class="contact-item">
                        <div class="contact-icon">✉️</div>
                        <div class="contact-details">
                            <h4>Email</h4>
                            <a href="mailto:contact@example.com">contact@example.com</a>
                        </div>
                    </div>
                    
                    <div class="contact-item">
                        <div class="contact-icon">💼</div>
                        <div class="contact-details">
                            <h4>LinkedIn</h4>
                            <a href="#" target="_blank" rel="noopener">linkedin.com/in/poorvi</a>
                        </div>
                    </div>
                </div>

                <div style="text-align: center; margin-top: 4rem; margin-bottom: 2rem;">
                    <h2 style="font-size: 2rem; margin-bottom: 1.5rem;">My <span style="background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Resume</span></h2>
                    <div class="btn-group" style="justify-content: center; margin-bottom: 2rem;">
                        <a href="resume.pdf" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
                            Download PDF
                        </a>
                    </div>
                    
                    <div class="resume-container">
                        <iframe src="resume.pdf" title="Poorvi Resume"></iframe>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Poorvi. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
